class OllamaBot:
    def __init__(self, model="llama3.1:8b"):
        self.model = model
        self.base_url = "http://localhost:11434/api"
    
    def chat(self, prompt, system_prompt=""):
        data = {
            "model": self.model,
            "prompt": prompt,
            "system": system_prompt,
            "stream": False
        }
        
        try:
            response = requests.post(f"{self.base_url}/generate", json=data)
            return response.json()["response"]
        except Exception as e:
            return f"Error: {e}"

# Initialize the bot
bot = OllamaBot()

@app.route('/')
def home():
    return render_template_string(HTML_TEMPLATE)

@app.route('/analyze_ad', methods=['POST'])
def analyze_ad():
    data = request.json
    system_prompt = "You are a Meta Ads expert specializing in Facebook and Instagram advertising optimization."
    
    prompt = f"""
    Analyze this Meta Ad copy and provide specific feedback:
    
    AD COPY: "{data['ad_text']}"
    
    Please provide:
    1. Emotional appeal assessment
    2. Call-to-action effectiveness
    3. Target audience suitability
    4. 3 specific improvement suggestions
    5. Estimated performance prediction
    """
    
    result = bot.chat(prompt, system_prompt)
    return jsonify({"response": result})

@app.route('/create_ad', methods=['POST'])
def create_ad():
