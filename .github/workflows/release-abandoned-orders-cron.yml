# Runs every 5 minutes to cancel unpaid orders older than 25 mins and restore inventory
name: Release Abandoned Orders

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allow manual trigger from Actions tab

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Call release-abandoned-orders
        run: |
          URL="${{ secrets.VITE_SUPABASE_URL }}/functions/v1/release-abandoned-orders"
          KEY="${{ secrets.VITE_SUPABASE_SERVICE_ROLE_KEY }}"
          if [ -z "$URL" ] || [ -z "$KEY" ]; then
            echo "Missing VITE_SUPABASE_URL or VITE_SUPABASE_SERVICE_ROLE_KEY in GitHub secrets"
            exit 1
          fi
          resp=$(curl -s -w "\n%{http_code}" -X POST "$URL" \
            -H "Authorization: Bearer $KEY" \
            -H "Content-Type: application/json")
          code=$(echo "$resp" | tail -n1)
          body=$(echo "$resp" | sed '$d')
          echo "Response ($code): $body"
          if [ "$code" -ge 400 ]; then
            exit 1
          fi
